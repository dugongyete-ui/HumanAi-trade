openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot control operations
  - name: signals
    description: Trading signals
  - name: market
    description: Market data
  - name: calendar
    description: Economic calendar
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
  /bot/analyze:
    post:
      operationId: triggerAnalysis
      tags: [bot]
      summary: Trigger manual analysis
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
  /signals:
    get:
      operationId: getSignals
      tags: [signals]
      summary: Get trading signals history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"
  /market/current:
    get:
      operationId: getCurrentMarket
      tags: [market]
      summary: Get current XAUUSD market data
      responses:
        "200":
          description: Current market data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketData"
  /calendar:
    get:
      operationId: getCalendar
      tags: [calendar]
      summary: Get upcoming economic calendar events
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WinRate:
      type: object
      properties:
        wins:
          type: integer
        losses:
          type: integer
        rate:
          type: integer
      required:
        - wins
        - losses
        - rate
    MonitorState:
      type: object
      properties:
        tp1:
          type: number
          description: First target (50% milestone), SL moves to breakeven when hit
        tp2:
          type: number
          description: Final target (original TP)
        trailingSL:
          type: number
          description: Active stop loss — starts at original SL, moves to breakeven on TP1
        tp1Hit:
          type: boolean
          description: Whether the TP1 milestone has been reached
      required:
        - tp1
        - tp2
        - trailingSL
        - tp1Hit
    BotStatus:
      type: object
      properties:
        running:
          type: boolean
        paused:
          type: boolean
        mode:
          type: string
          enum: [ANALYZING, MONITORING]
        lastAnalysis:
          type: string
          nullable: true
        totalSignals:
          type: integer
        lastSignal:
          $ref: "#/components/schemas/Signal"
          nullable: true
        activeSignal:
          $ref: "#/components/schemas/Signal"
          nullable: true
        monitorState:
          $ref: "#/components/schemas/MonitorState"
          nullable: true
        winRate:
          $ref: "#/components/schemas/WinRate"
        nextAnalysisIn:
          type: integer
          nullable: true
          description: Seconds until next scheduled analysis
      required:
        - running
        - paused
        - mode
        - totalSignals
        - winRate
    Signal:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
        decision:
          type: string
          enum: [BUY, SELL, WAIT]
        confidence:
          type: number
        entry_price:
          type: number
          nullable: true
        take_profit:
          type: number
          nullable: true
        stop_loss:
          type: number
          nullable: true
        reasoning:
          type: string
        market_context:
          type: string
        current_price:
          type: number
        status:
          type: string
          enum: [active, tp_hit, sl_hit, wait, tp1_hit]
          nullable: true
        result:
          type: string
          enum: [WIN, LOSS]
          nullable: true
        exit_price:
          type: number
          nullable: true
        exit_time:
          type: string
          nullable: true
      required:
        - id
        - timestamp
        - decision
        - confidence
        - reasoning
        - market_context
        - current_price
    MarketData:
      type: object
      properties:
        symbol:
          type: string
        current_price:
          type: number
        bid:
          type: number
        ask:
          type: number
        timestamp:
          type: string
        candles_m15:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
        candles_h1:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
      required:
        - symbol
        - current_price
        - timestamp
    Candle:
      type: object
      properties:
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        epoch:
          type: integer
      required:
        - open
        - high
        - low
        - close
        - epoch
    CalendarEvent:
      type: object
      properties:
        title:
          type: string
        date:
          type: string
          description: ISO datetime string (EST timezone)
        country:
          type: string
        impact:
          type: string
        forecast:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        actual:
          type: string
          nullable: true
      required:
        - title
        - date
        - country
        - impact
    CalendarResponse:
      type: object
      properties:
        alertLevel:
          type: string
          enum: [CLEAR, CAUTION, HIGH_ALERT]
        alertMessage:
          type: string
        upcomingEvents:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEvent"
        todayEvents:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEvent"
      required:
        - alertLevel
        - alertMessage
        - upcomingEvents
        - todayEvents
